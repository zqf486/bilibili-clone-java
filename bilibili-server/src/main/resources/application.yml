server:
  port: 8080

spring:
  profiles:
    active: dev
  datasource:
    driver-class-name: ${bilibili.datasource.driver-class-name}
    url: jdbc:mysql://${bilibili.datasource.host}:${bilibili.datasource.port}/${bilibili.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: ${bilibili.datasource.username}
    password: ${bilibili.datasource.password}
  data:
    redis:
      host: ${bilibili.redis.host}
      port: ${bilibili.redis.port}
      #      password: ${bilibili.redis.password}
      database: ${bilibili.redis.database}
      timeout: ${bilibili.redis.timeout}
      lettuce:
        pool:
          max-idle: ${bilibili.redis.lettuce.pool.max-idle}
          max-active: ${bilibili.redis.lettuce.pool.max-active}
          min-idle: ${bilibili.redis.lettuce.pool.min-idle}
  cache:
    type: redis

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

minio:
  endpoint: ${bilibili.minio.endpoint}
  access-key: ${bilibili.minio.access-key}
  secret-key: ${bilibili.minio.secret-key}
  bucket: ${bilibili.minio.bucket}

upload:
  chunk-size: ${bilibili.upload.chunk-size:5242880}
  task-ttl: ${bilibili.upload.task-ttl:1}

video:
  script-dir: ${bilibili.video.script-dir:/tmp/bilibili-scripts}
  temp-dir: ${bilibili.video.temp-dir:/tmp/bilibili-video}
  thumbnail-seek: ${bilibili.video.thumbnail-seek:5}
  transcode:
    enabled: ${bilibili.video.transcode.enabled:true}
    pool-size: ${bilibili.video.transcode.pool-size:2}
    hdr:
      enabled: ${bilibili.video.transcode.hdr.enabled:true}
      resolutions:
        - height: 1080
          bitrate: 5000k
          encoder: libx265
          crf: 18
          pixel-format: yuv420p10le
    sdr:
      tonemap: ${bilibili.video.transcode.sdr.tonemap:hable}
      resolutions:
        - height: 1080
          bitrate: 5000k
          encoder: libx264
          crf: 23
          pixel-format: yuv420p
        - height: 720
          bitrate: 2500k
          encoder: libx264
          crf: 23
          pixel-format: yuv420p
        - height: 480
          bitrate: 800k
          encoder: libx264
          crf: 23
          pixel-format: yuv420p

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /doc.html
  packages-to-scan: com.bilibili
